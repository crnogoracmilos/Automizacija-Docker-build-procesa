name: CI Pipeline

on:
  push:
    branches: [ "main" ] # Pipeline se pokreće kada gurneš kod na main granu

env:
  DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_NAME: moj-projekat-fon # Ovde možeš staviti ime koje želiš za sliku

jobs:
  lint:
    name: Dockerfile Lint (Hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Pokreni Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  build-scan-push:
    name: Build, Scan and Push
    needs: lint # Ovaj posao čeka da Hadolint prođe uspešno
    runs-on: ubuntu-latest
    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Podesi Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prijava na Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 1. Build slike lokalno za skeniranje
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:test-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 2. Skeniranje slike (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:test-scan'
          format: 'table'
          exit-code: '1' # Ako nađe kritične ranjivosti, prekida se pipeline
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 3. Push bezbedne slike na Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
